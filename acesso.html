<!DOCTYPE html><html lang="pt-BR"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Acesso — CRM Deuba</title>
<style>
body{font-family:system-ui,sans-serif;background:#6f2f4d;display:flex;align-items:center;justify-content:center;min-height:100vh;margin:0}
.box{background:#fff;border-radius:16px;padding:32px 28px;width:100%;max-width:380px;box-shadow:0 8px 40px rgba(0,0,0,.25)}
h2{color:#6f2f4d;font-size:22px;margin:0 0 6px}
p{color:#888;font-size:13px;margin:0 0 20px}
label{display:block;font-size:13px;font-weight:600;color:#333;margin-bottom:4px}
input{width:100%;padding:10px 12px;border:1.5px solid #ddd;border-radius:9px;font-size:15px;box-sizing:border-box;margin-bottom:14px}
button{width:100%;padding:12px;background:#8a3a5e;color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer}
button:disabled{opacity:.6}
.err{color:#c0392b;font-size:13px;margin-bottom:10px;display:none}
.ok{color:#1a7a4d;font-size:13px;margin-bottom:10px;display:none}
.vault-box{background:#fff8f0;border:1.5px solid #f0c080;border-radius:10px;padding:12px;margin-bottom:14px;display:none}
.vault-box p{color:#92400e;font-size:12px;margin:0 0 8px}
</style></head><body>
<div class="box">
  <h2>Acesso ao CRM</h2>
  <p>Deuba Assunção · Araújo Jorge</p>
  <div class="err" id="err"></div>
  <div class="ok" id="ok"></div>
  <label>E-mail</label>
  <input type="email" id="email" value="assuncaodeuba@gmail.com">
  <label>Senha de acesso</label>
  <input type="password" id="pass" placeholder="Senha principal">
  <div class="vault-box" id="vaultBox">
    <p>🔐 Sua senha de acesso é diferente da senha dos dados.<br>Digite a <strong>senha original</strong> com que os dados foram criados:</p>
    <input type="password" id="vaultPass" placeholder="Senha original dos dados" style="margin-bottom:0">
  </div>
  <button id="btn" onclick="entrar()">Entrar</button>
</div>

<script>
window.CLOUD_CONFIG = {
  url: 'https://qpvaseqokinuskupzhch.supabase.co',
  key: 'sb_publishable_Zf5DNw5UbcVGTaLwVVMngA_14DzQ7-f'
};

async function loadSupabase(){
  if(window.supabase) return;
  await new Promise((res,rej)=>{ const s=document.createElement('script'); s.src='https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2'; s.onload=res; s.onerror=rej; document.head.appendChild(s); });
}

async function authHash(pwd, email){
  const text = pwd + '::auth::' + email.toLowerCase();
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(text));
  return 'A1' + Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
}

function b642ab(b64){ const bin=atob(b64); const b=new Uint8Array(bin.length); for(let i=0;i<bin.length;i++) b[i]=bin.charCodeAt(i); return b.buffer; }
async function deriveKey(pwd, saltBytes){
  const base = await crypto.subtle.importKey('raw', new TextEncoder().encode(pwd), 'PBKDF2', false, ['deriveKey']);
  return crypto.subtle.deriveKey({name:'PBKDF2',salt:saltBytes,iterations:150000,hash:'SHA-256'}, base, {name:'AES-GCM',length:256}, false, ['encrypt','decrypt']);
}
async function decrypt(payload, k){
  const iv = new Uint8Array(payload.iv);
  const ct = b642ab(payload.ct);
  const pt = await crypto.subtle.decrypt({name:'AES-GCM',iv}, k, ct);
  return JSON.parse(new TextDecoder().decode(pt));
}

let client = null;
async function entrar(){
  const btn = document.getElementById('btn');
  const err = document.getElementById('err');
  const ok  = document.getElementById('ok');
  err.style.display='none'; ok.style.display='none';
  btn.disabled=true; btn.textContent='Entrando…';

  try{
    await loadSupabase();
    const cfg = window.CLOUD_CONFIG;
    client = window.supabase.createClient(cfg.url, cfg.key, {auth:{persistSession:true,autoRefreshToken:true}});

    const email = document.getElementById('email').value.trim();
    const pwd   = document.getElementById('pass').value;
    const vaultPwd = document.getElementById('vaultPass').value;

    // 1. Auth Supabase
    const authp = await authHash(pwd, email);
    const { data, error } = await client.auth.signInWithPassword({email, password: authp});
    if(error) throw new Error('E-mail ou senha incorretos: ' + error.message);

    // 2. Buscar cofre
    const { data: row, error: rerr } = await client.from('vault').select('salt,blob,updated_at').maybeSingle();
    if(rerr) throw new Error('Erro ao buscar dados: ' + rerr.message);
    if(!row || !row.blob){ ok.textContent='✅ Conta nova — redirecionando…'; ok.style.display='block'; setTimeout(()=>window.location.href='/',1500); return; }

    // 3. Decifrar — tenta as senhas
    const salt = new Uint8Array(JSON.parse(row.salt));
    const senhas = [pwd];
    if(vaultPwd && vaultPwd !== pwd) senhas.push(vaultPwd);

    let decifrado = false;
    for(const s of senhas){
      try{
        const k = await deriveKey(s, salt);
        await decrypt(JSON.parse(row.blob), k);
        decifrado = true;
        break;
      }catch(e){}
    }

    if(!decifrado){
      // mostra campo de senha do cofre e pede
      document.getElementById('vaultBox').style.display='block';
      document.getElementById('vaultPass').focus();
      err.textContent = 'Senha dos dados incorreta. Digite a senha original dos dados no campo acima.';
      err.style.display='block';
      btn.disabled=false; btn.textContent='Entrar';
      return;
    }

    // 4. Redireciona para o sistema com a sessão ativa
    ok.textContent='✅ Dados verificados! Abrindo o sistema…';
    ok.style.display='block';
    setTimeout(()=>window.location.href='/', 1200);

  }catch(e){
    err.textContent = e.message;
    err.style.display='block';
    btn.disabled=false; btn.textContent='Entrar';
  }
}
document.addEventListener('keydown', e=>{ if(e.key==='Enter') entrar(); });
</script>
</body></html>
